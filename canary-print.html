<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<link rel="canonical" href="https://canary.desk/" />
<title>Canary — C01 Capsule (Print)</title>

<script>
  // Early palette resolver: pull palette from localStorage and set CSS vars
  // immediately so print CSS sees the right colors from the very first paint.
  (function () {
    try {
      const PALETTES = {
        canary: { bg: '#FFFFFF', fg: '#111111' },
        white:  { bg: '#FFFFFF', fg: '#111111' },
        recon:  { bg: '#2B2C2E', fg: '#FFFFFF' },
        strike: { bg: '#FF5B1F', fg: '#111111' }
      };
      // Priority 1: URL query (?palette=white) — works across storage partitions
      let palette = null;
      try {
        const u = new URL(location.href);
        palette = u.searchParams.get('palette');
      } catch (e) {}
      // Priority 2: opener window's localStorage (if not partitioned)
      if (!palette && window.opener) {
        try {
          const raw = window.opener.localStorage.getItem('canary.tweaks.v1');
          if (raw) palette = JSON.parse(raw).palette;
        } catch (e) {}
      }
      // Priority 3: own localStorage
      if (!palette) {
        try {
          const raw = localStorage.getItem('canary.tweaks.v1');
          if (raw) palette = JSON.parse(raw).palette;
        } catch (e) {}
      }
      const p = PALETTES[palette] || PALETTES.canary;
      const r = document.documentElement.style;
      r.setProperty('--canary', p.bg, 'important');
      r.setProperty('--ink', p.fg, 'important');
      // Also persist so tweaks-host (loaded later) sees it and doesn't overwrite
      try {
        const raw = localStorage.getItem('canary.tweaks.v1');
        const s = raw ? JSON.parse(raw) : {};
        s.palette = palette || s.palette || 'canary';
        localStorage.setItem('canary.tweaks.v1', JSON.stringify(s));
      } catch (e) {}
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --canary: #FFFFFF;
    --ink: #111111;
    --ink-60: rgba(17,17,17,0.6);
    --ink-40: rgba(17,17,17,0.4);
    --ink-20: rgba(17,17,17,0.2);
    --ink-10: rgba(17,17,17,0.1);
    --paper: #F4F1EA;
    --cream: #E8E2D1;
    --graphite: #1E1E1E;
    --signal: #D9CFB2; /* C01 Signal neutral/cream */
    --recon:  #2B2C2E; /* C01 Recon graphite */
    --strike: #FF5B1F; /* C01 Strike accent */
  }
  * , *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canary); color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    font-family: 'Space Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  ::selection { background: var(--ink); color: var(--canary); }

  .font-display { font-family: 'Anton', Impact, sans-serif; font-weight: 400; letter-spacing: 0; }
  .font-mono { font-family: 'Space Mono', 'Courier New', monospace; }
  .uppercase { text-transform: uppercase; }

  /* fade/slide-up reveal triggered by IntersectionObserver */
  [data-reveal] {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.9s cubic-bezier(0.2, 0.7, 0.2, 1), transform 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
    transition-delay: var(--reveal-delay, 0ms);
    will-change: opacity, transform;
  }
  [data-reveal].is-visible { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) {
    [data-reveal] { opacity: 1; transform: none; transition: none; }
  }

  /* striped image placeholder */
  .placeholder {
    position: relative;
    background:
      repeating-linear-gradient(
        135deg,
        rgba(17,17,17,0.08) 0 12px,
        rgba(17,17,17,0.04) 12px 24px
      ),
      color-mix(in srgb, var(--canary) 92%, var(--ink));
    border: 1px solid var(--ink);
    color: var(--ink-60);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    padding: 12px;
  }
  .placeholder::before {
    content: "";
    position: absolute; inset: 6px;
    border: 1px dashed var(--ink-20);
    pointer-events: none;
  }
  .placeholder .ph-label {
    position: relative; z-index: 1;
    background: var(--canary);
    padding: 6px 10px;
    border: 1px solid var(--ink);
  }

  /* inverse section (ink bg) */
  .inverse { background: var(--ink); color: var(--canary); }
  .inverse ::selection { background: var(--canary); color: var(--ink); }
  .inverse .placeholder {
    background:
      repeating-linear-gradient(
        135deg,
        rgba(255,239,0,0.08) 0 12px,
        rgba(255,239,0,0.03) 12px 24px
      ),
      #1A1A1A;
    border-color: var(--canary);
    color: rgba(255,239,0,0.6);
  }
  .inverse .placeholder::before { border-color: rgba(255,239,0,0.18); }
  .inverse .placeholder .ph-label { background: var(--ink); color: var(--canary); border-color: var(--canary); }

  /* hairline divider */
  .hair { height: 1px; background: var(--ink); width: 100%; }
  .inverse .hair { background: var(--canary); }

  /* util tick */
  .tick {
    display: inline-block; width: 6px; height: 6px; background: var(--ink); vertical-align: middle; margin-right: 8px; transform: translateY(-1px);
  }
  .inverse .tick { background: var(--canary); }

  /* black bottom bar */
  .bottom-bar {
    height: clamp(6px, 1.2vw, 14px);
    background: var(--ink);
    width: 100%;
  }

  /* focus */
  :focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }
  .inverse :focus-visible { outline-color: var(--canary); }

  /* ------ Tweaks panel ------ */
  #tweaks-panel {
    position: fixed;
    right: 20px; bottom: 20px;
    width: 320px;
    max-width: calc(100vw - 40px);
    background: var(--ink);
    color: var(--canary);
    border: 1px solid var(--canary);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    z-index: 1000;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    display: none;
    max-height: calc(100vh - 40px);
    overflow: auto;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel header {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--canary);
    position: sticky; top: 0; background: var(--ink);
  }
  #tweaks-panel header h3 {
    margin: 0; font-family: 'Anton', Impact, sans-serif; font-size: 18px; letter-spacing: 0.04em;
  }
  #tweaks-panel .tw-section {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,239,0,0.25);
  }
  #tweaks-panel .tw-section:last-child { border-bottom: 0; }
  #tweaks-panel label {
    display: block;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  #tweaks-panel input[type="text"],
  #tweaks-panel input[type="datetime-local"],
  #tweaks-panel textarea,
  #tweaks-panel select {
    width: 100%;
    background: transparent;
    color: var(--canary);
    border: 1px solid var(--canary);
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  #tweaks-panel textarea { resize: vertical; min-height: 60px; }
  #tweaks-panel .tw-row { display: flex; gap: 8px; align-items: center; }
  #tweaks-panel button.tw-btn {
    flex: 1;
    background: transparent;
    color: var(--canary);
    border: 1px solid var(--canary);
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  #tweaks-panel button.tw-btn[aria-pressed="true"] {
    background: var(--canary); color: var(--ink);
  }
  #tweaks-panel .tw-close {
    background: transparent; color: var(--canary); border: 0; cursor: pointer; font-size: 16px;
  }
  #tweaks-panel .tw-palette {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  #tweaks-panel .tw-palette button {
    height: 36px; border: 1px solid var(--canary); cursor: pointer; background: var(--canary);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
    color: var(--ink);
    text-transform: uppercase;
  }
  #tweaks-panel .tw-palette button[aria-pressed="true"] { outline: 2px solid var(--canary); outline-offset: 2px; }
  #tweaks-panel .tw-order {
    list-style: none; margin: 0; padding: 0;
  }
  #tweaks-panel .tw-order li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border: 1px solid rgba(255,239,0,0.4); margin-bottom: 4px; font-size: 11px;
  }
  #tweaks-panel .tw-order li .tw-mv { display: flex; gap: 4px; }
  #tweaks-panel .tw-order button {
    background: transparent; color: var(--canary); border: 1px solid var(--canary); cursor: pointer;
    width: 24px; height: 24px; font-size: 12px; line-height: 1;
  }

  /* make sure no horizontal overflow from large wordmarks */
  .no-scroll-x { overflow-x: clip; }

  /* ===== Print ===== */
  @media print {
    @page {
      size: A4 portrait;
      margin: 10mm;
    }
    html, body {
      background: var(--canary) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Hide interactive tweaks UI */
    #tweaks-panel, .tweaks-toggle, [data-tweaks-toggle] { display: none !important; }
    /* Force any reveal-animated elements visible */
    [data-reveal] { opacity: 1 !important; transform: none !important; transition: none !important; }
    /* Prevent awkward mid-section breaks */
    section, .section { break-inside: avoid; page-break-inside: avoid; }
    /* Encourage new pages on major section boundaries */
    section + section, .section + .section { break-before: page; page-break-before: always; }
    /* Remove any fixed-position chrome */
    [style*="position: fixed"], .fixed { position: static !important; }
    /* Show video poster only, not the video itself */
    video { break-inside: avoid; }
    /* Make sure inverse sections render dark */
    .inverse { background: var(--ink) !important; color: var(--canary) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

</style>

<!-- Tweaks panel (vanilla, not React, so it persists state via localStorage + drives React via event) -->
<div id="tweaks-panel" role="dialog" aria-label="Tweaks">
  <header>

    <button class="tw-close" aria-label="Close Tweaks">✕</button>

  <div class="tw-section">

  <div class="tw-section">

  <div class="tw-section">
    <label>Drop date (TBD if blank)</label>
    <input type="datetime-local" id="tw-drop-date" />
    <div style="height:8px"></div>
    <label>Countdown</label>
    <div class="tw-row" id="tw-countdown">
      <button class="tw-btn" data-countdown="off">Off</button>
      <button class="tw-btn" data-countdown="on">On</button>
    </div>
  </div>
  <div class="tw-section">
    <label>Palette</label>
    <div class="tw-palette" id="tw-palette">

      <button data-palette="white"  style="background:#FFFFFF;color:#111;border:1px solid #FFFFFF">White</button>
      <button data-palette="recon"  style="background:#2B2C2E;color:#FFFFFF">Recon</button>
      <button data-palette="strike" style="background:#FF5B1F;color:#111">Strike</button>

<script>
  // Print-mode bootstrap: wait for fonts + React render + video poster, then print.
  (async function () {
    // Hide tweaks panel outright (even before print media triggers)
    const tweaks = document.getElementById('tweaks-panel');
    if (tweaks) tweaks.style.display = 'none';

    // Pause any videos so they render their first frame / poster cleanly
    function pauseAllVideos() {
      document.querySelectorAll('video').forEach(v => {
        try {
          v.autoplay = false;
          v.loop = false;
          v.muted = true;
          v.pause();
          v.currentTime = 0;
        } catch (e) {}
      });
    }

    // Wait for fonts
    try { await document.fonts.ready; } catch (e) {}

    // Wait for React to render (mount signaled by presence of #root children)
    await new Promise(resolve => {
      const root = document.getElementById('root');
      if (root && root.children.length) return resolve();
      const obs = new MutationObserver(() => {
        if (root && root.children.length) { obs.disconnect(); resolve(); }
      });
      if (root) obs.observe(root, { childList: true, subtree: true });
      setTimeout(resolve, 4000); // hard fallback
    });

    pauseAllVideos();
    // Re-pause after a tick in case autoplay fires late
    setTimeout(pauseAllVideos, 300);

    // Small buffer for any late layout/image decoding
    await new Promise(r => setTimeout(r, 700));
    window.print();
  })();
</script>
